version: "3.9"

services:
  # ─── Frontend (Nginx) ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - portfolio-net

  # ─── Phase 2: FastAPI Backend ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - portfolio-net

  # ─── Ngrok Tunnel ──────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    command: http web:80
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - web
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
